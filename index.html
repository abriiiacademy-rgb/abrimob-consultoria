<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABRimob — Consultoria Exclusiva</title>

<!-- ============================================================= -->
<!--  TROQUE O NÚMERO DO WHATSAPP AQUI ↓ (só esta linha)            -->
<!--  Formato internacional, só dígitos: 55 + DDD + número         -->
<!--  Ex.: 5547999998888                                            -->
<!-- ============================================================= -->
<script>
  var WHATSAPP_NUMERO = "5547991279471";
  var MENSAGEM = "Quero marcar minha consultoria exclusiva!";
</script>

<!-- ============================================================= -->
<!--  COLE O ID DO PIXEL DA ABRIMOB AQUI ↓ (só os números)         -->
<!--  Crie em business.facebook.com/events_manager                 -->
<!--  Enquanto estiver vazio, o pixel não dispara (sem erro).      -->
<!--  Ex.: var PIXEL_ID = "1034525752246405";                      -->
<!-- ============================================================= -->
<script>
  var PIXEL_ID = "2723383191382238";
</script>
<!-- ============================================================= -->
<!--  Pronto. Salve o arquivo e republique na Vercel.              -->
<!-- ============================================================= -->

<!-- Meta Pixel: só inicializa se PIXEL_ID estiver preenchido -->
<script>
  (function(){
    if(!PIXEL_ID){ window.__pixelOn = false; return; }
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window,document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', PIXEL_ID);
    fbq('track', 'PageView');   // dispara para todo mundo que abre a pagina
    window.__pixelOn = true;
  })();
</script>

<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:#3a1f7a;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    overflow:hidden;
  }

  /* loader (caminho feliz): fundo roxo + spinner, some quando some */
  #loader{
    position:fixed; inset:0; z-index:3;
    display:flex; align-items:center; justify-content:center;
    background:#3a1f7a;
  }
  #loader.hidden{ display:none; }
  .spinner{
    width:38px;height:38px;
    border:3px solid rgba(255,255,255,0.25);
    border-top-color:#fff; border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* fallback: SEMPRE montado no DOM, só invisível por baixo do loader */
  #fallback{ position:fixed; inset:0; z-index:1; }

  .presell{
    position:absolute; inset:0;
    width:100%; height:100%;
    background:#3a1f7a url('presell-bg.png') no-repeat center center;
    background-size:cover;
    cursor:pointer; text-decoration:none; display:block;
  }

  /* área quente sobre o botão dourado pintado na imagem (1080x1920) */
  .hot{
    position:absolute;
    left:8%; right:8%;
    top:63.5%; height:9%;
    border-radius:40px;
    background:transparent;
  }
  .presell:active .hot{ background:rgba(255,255,255,0.15); }

  .safe-hint{
    position:absolute; top:0; left:0; right:0; z-index:2;
    padding:14px; text-align:center;
    font-size:13px; color:rgba(255,255,255,0.9);
    background:linear-gradient(180deg,rgba(0,0,0,0.4),transparent);
  }

  @media (prefers-reduced-motion: reduce){
    .spinner{animation:none;}
  }
</style>
</head>
<body>

  <!-- fallback montado desde o início (fica atrás do loader) -->
  <div id="fallback">
    <a id="presellLink" class="presell" href="#" rel="noopener" aria-label="Marcar minha consultoria exclusiva no WhatsApp">
      <span class="safe-hint">Se o WhatsApp não abrir, toque na tela</span>
      <span class="hot"></span>
    </a>
  </div>

  <!-- loader por cima: o que a pessoa vê no caminho feliz -->
  <div id="loader"><div class="spinner" aria-label="Abrindo WhatsApp"></div></div>

<script>
  (function(){
    var numero = (WHATSAPP_NUMERO || "").replace(/\D/g,"");
    var msg = encodeURIComponent(MENSAGEM || "");
    var url = "https://wa.me/" + numero + (msg ? "?text=" + msg : "");

    // dispara o evento Lead uma unica vez (no encaminhamento pro WhatsApp)
    var leadFired = false;
    function fireLead(){
      if(leadFired) return;
      leadFired = true;
      if(window.__pixelOn && window.fbq){
        try{ fbq('track', 'Lead'); }catch(e){}
      }
    }

    // 1) link do fallback pronto ANTES de tudo
    var link = document.getElementById("presellLink");
    if(link){
      link.setAttribute("href", url);
      // clique no fallback tambem conta como Lead
      link.addEventListener("click", fireLead);
    }

    // 2) agenda a revelação do fallback ANTES de tentar navegar
    function revealFallback(){
      var ld = document.getElementById("loader");
      if(ld){ ld.className = "hidden"; }
    }
    // se em 1.5s a pessoa ainda está aqui, o redirect falhou -> revela
    var t = setTimeout(revealFallback, 1500);

    // se a aba volta a ficar visível, garante a revelação
    document.addEventListener("visibilitychange", function(){
      if(document.visibilityState === "visible"){ setTimeout(revealFallback, 300); }
    });

    // 3) dispara o Lead e em seguida o redirect (atraso minimo garante pixel/DOM prontos)
    setTimeout(function(){
      fireLead();   // encaminhamento automatico = Lead
      try{ window.location.href = url; }catch(e){ revealFallback(); }
    }, 120);
  })();
</script>
</body>
</html>
